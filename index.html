<!--Déclaration HTML récent-->
<!DOCTYPE html>
<html>



    <head>
        <meta charset="UTF-8">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">        
        <link rel="stylesheet" href="style.css">

        
    </head>

    <body>
        <div class="hud-panel">

            <div class="header">
            <!--Identité - num plant - variete-->
                <div class="identity">
                    <p class="text-plant">Plant #12</p>
                    <p class="variety">OG KUSH</p>
                </div>
            <!--Qualité ID par lettre-->               
                <div class="quality">
                    B+
                </div>
            </div>

            <!--Jauge eau plant-->
            <div class="water">
                <p class="label">Eau</p>

                <div class="water-gauge">
                    <div class="gauge-blue"></div>
                </div>

                <span class="percent">64%</span>
            </div>

            <!--Jauge fertilisant plant-->
            <div class="fertiliser">
                <p class="label">Fertilisant</p>
                
                <div class="fertilizer-gauge">
                    <div class="gauge-orange"></div>
                </div>

                <p class="percent">72%</p>  
            </div>              

            <!--Jauge croissance plant-->
            <div class="growth">
                <p class="label">Croissance</p>
            
                <div class="growth-gauge">
                    <div class="gauge-green"></div>
                </div>
                <p class="percent">48%</p>
            </div>            

            <!-- barre de séparation-->
            <div class="separate"></div>

            <!--Temps restant avant récolte-->
            <div class="harvest">
                <div class="label-counter">Récolte dans :</div>
                <div class="counter">14:32</div>
            </div>

            <!--Rappel touche arroser, fertiliser-->
            <div class="text">
                <div class="key">
                    <div class="e-key">E</div>
                    <span class="label-water">Arroser</span>
                    <p class="f-key">F</p>
                    <span class="label-fertilizer">Fertiliser</span>
                </div>

                <div class="key">

                </div>
  


    </body>





</html>
